<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSITY REGISTRATION FORM</title>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register</p>
    <hr>
<form>
    <h2>Personal Details</h2>

    <label for ="firstname">First Name : </label>
    <input type = "text" name = "username" id = "firstname" placeholder = "e.g: saurabh" required>
    <br><br>

     <label for ="lastname">Last Name : </label>
    <input type = "text" name = "userlastname" id = "lastname" placeholder = "e.g: mishra" required>
<br><br>
    
     <label for ="dob">Date of Birth : </label>
    <input type = "date" name = "userdob" id = "dob" required>
<br>


   <h3>Gender: </h3>
    <input type = "radio" name = "gender" id = "male" value ="male">
    <label for = "male">Male</label>
    <br>

     <input type = "radio" name = "gender" id = "female" value ="female">
    <label for = "female">Female</label>
<br>
     <input type = "radio" name = "gender" id = "other" value ="other">
    <label for = "other">Other</label>
<br>

<label for="photo">Upload Your Photo:</label>
<input type="file" name="file" id="photo">

<hr>

<h2>Contact Information</h2>
<label for ="Email">Email Address : </label>
    <input type = "email" name = "email" id = "Email" placeholder = "e.g: sauarbh12@bhugmail.com" required>
<br><br>
<label for ="contact">contact Number : </label>
    <input type = "tel" name = "mobile" id = "contact" pattern ="[0-9]{10}" placeholder = "e.g: 1234567890" required>
    <br><br>
<label for = "Address">Mailing Address:</label>
<br>
    <textarea name = "Address" id = "Address" rows = "10" cols ="30" placeholder="e.g. 512/189 nishatganj house no 89 gali 6th D LUCKNOW" ></textarea>

    <hr>
    <h2> Academic Information</h2>
    <label for = "course">Select Your Course :</label>
    <select name = "course" id = "course">
        <option value = "CSE">CSE</option>
         <option value = "ME">ME</option>
          <option value = "ECE">ECE</option>
           <option value = "CSE-AI">CSE-AI</option>
    </select>

    <br>
        <h3>Extracurricular Activities</h3>
        <label for = "Sports">Sports</label>
        <input type = "checkbox" name = "interest" id = "Sports" value = "Sports">
        <br><br>

        <label for = "Music">Music</label>
        <input type = "checkbox" name = "interest" id = "Music" value = "Music">
        <br><br>

        <label for = "Technology">Technology Clubs</label>
        <input type = "checkbox" name = "interest" id = "Technology" value = "technology">
        <br><br>

        <label for = "volunteering">Volunteering</label>
        <input type = "checkbox" name = "interest" id = "volunteering" value = "volunteering">
        <br><br>
        <hr>
        <h2>Create Your Account</h2>

        <label for = "pass">Create a Password :</label>
        <input type = "password" name = "password" id = "pass" required>
        <br><br>

         <label for = "security">Security Question :</label>
        <select name = "security" id = "security">
        <option value = "security">What was your first pet's name ?</option>
        <option value = "security">What is the name of your first School?</option>
        <option value = "security">Which city were you born in?</option>
         
    </select>

    <label for ="security_ans">Security answer: </label>
    <input type = "text" name = "security" id = "security_ans" >
    <br><br>


    <button type = "submit">Register</button>
    <button type = "reset">Clear Form</button>
    <br>
    <hr>

 </form>

</body>
</html>
